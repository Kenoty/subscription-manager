services:

  db:
    image: postgres:16-alpine
    container_name: subtrack-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER:  ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/script.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: subtrack-backend
    environment:
      DB_PROTOCOL: ${DB_PROTOCOL:-jdbc:postgresql}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend-react:
    build: ./frontend/React
    container_name: subtrack-react
    ports:
      - "3000:80"
    depends_on:
      - backend

  frontend-angular:
    build: ./frontend/Angular
    container_name: subtrack-angular
    ports:
      - "4000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
